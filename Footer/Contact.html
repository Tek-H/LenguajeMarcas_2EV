<body>
    
    <header class="header">
            <div class="header__box">
                <div class="header__titleBox">
                    <img src="../Imagenes/Escudos/logoArsenal.png" class="header__img" alt="logo_icon">
                    <h1 class="header__title">ARSENAL FC</h1>
                </div>
                <nav class="nav">
                    <a href="../Home/Home.html" class="button__link"><button class="nav__link">Home</button></a>
                    <a href="../Shop/Shop.html" class="button__link"><button class="nav__link">Shop</button></a>
                    <a href="../Pages/Players.html" class="button__link"><button class="nav__link">Players</button></a>
                    <a href="../Pages/Trophies.html" class="button__link"><button class="nav__link">Trophies</button></a>
                    <a href="../Pages/Tickets.html" class="button__link"><button class="nav__link">Tickets</button></a>
                    <button class="button button--clear" id="theme-toggle">☾</button>
                </nav>
                
                
                <div class="nav__item">
                    <a href="#" class="nav__link">☰</a>
                    <div class="dropdown">
                        <a href="../Home/Home.html" class="nav__link">Home</a>
                        <a href="../Shop/Shop.html" class="nav__link">Shop</a>
                        <a href="../Pages/Players.html" class="nav__link">Players</a>
                        <a href="../Pages/Trophies.html" class="nav__link">Trophies</a>
                        <a href="../Pages/Tickets.html" class="nav__link">Tickets</a>
                        <button class="button button--clear" id="theme-toggle2">☾</button>
                    </div>
                </div>

            </div>
    </header>

    <section class="contact">

        <div class="contact__box">

            <h1 class="title">GET IN TOUCH</h1>
            <p class="text">We would like to hear from you</p>

            <div class="contact__form">

                <div class="contact__name">
                    <input class="contact__input" type="text" placeholder="First name">
                    <input class="contact__input" type="text" placeholder="Last name">
                </div>

                <input class="contact__input" type="text" placeholder="Email">
                
                <input class="contact__input contact__input--message" type="text" placeholder="Message">

                <button class="button">SEND</button>

            </div>

        </div>

    </section>

    <footer class="footer">

            <div class="footer__box">

                <div class="footer__info">

                    <img class="footer__img" src="../Imagenes/Escudos/Píxel.png" alt="Arsenal">

                    <div class="footer__left">

                        <h2 class="footer__title">Arsenal</h2>
                        <p class="footer__description">Official webpage of Arsenal FC.</p>

                        <div class="footer__icons">

                            <a class="button__link" href="https://www.facebook.com/Arsenal/?locale=es_LA"><img alt="footer_icon" src="../Imagenes/Logos/icons8-facebook-nuevo-50.png" class="footer__icon"></a>
                            <a class="button__link" href="https://www.instagram.com/arsenal/"><img alt="footer_icon" src="../Imagenes/Logos/icons8-instagram-50.png" class="footer__icon"></a>
                            <a href="https://x.com/Arsenal"><img alt="footer_icon" src="../Imagenes/Logos//icons8-x-50.png" class="footer__icon"></a>

                        </div>

                    </div>

                    <div class="footer__column">
                        <h3>Features</h3>
                        <a href="Home.html" class="footer__text">Home</a>
                        <a href="../Shop/Shop.html" class="footer__text">Shop</a>
                        <a href="../Pages/Players.html" class="footer__text">Players</a>
                        <a href="../Pages/Trophies.html" class="footer__text">Trophies</a>
                        <a href="../Pages/Tickets.html" class="footer__text">Tickets</a>
                    </div>

                    <div class="footer__column">
                        <h3>Support</h3>
                        <a href="../Footer/Contact.html" class="footer__text">Contact</a>
                        <a href="../Footer/Support.html" class="footer__text">Support</a>
                        <a href="../Footer/Legal.html" class="footer__text">Legal</a>
                    </div>

                </div>

                <div class="footer__form">
                    <h3 class="footer__title3">SUBSCRIBE TO OUR NEWSLETTER</h3>
                    <input class="footer__input" type="text" placeholder="Email">
                    <button class="button">SUBSCRIBE</button>
                </div>

            </div>

            <p class="footer__description">© 2025 Arsenal. Todos los derechos reservados.</p>

    </footer>

    <script src="../JavaScript/darkMode.js"></script>
